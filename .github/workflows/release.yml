name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Verify build
        run: go build ./...

      - name: Run tests
        run: go test -race ./...

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false

      - name: Update versions.json
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DATE=$(date -u +%Y-%m-%d)
          cat docs/public/versions.json | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          tag = '$TAG'
          date = '$DATE'
          data['latest'] = tag
          if not any(v['tag'] == tag for v in data['versions']):
              data['versions'].insert(0, {'tag': tag, 'date': date, 'label': tag + ' (latest)'})
          for v in data['versions']:
              v['label'] = v['tag'] + (' (latest)' if v['tag'] == tag else '')
          json.dump(data, sys.stdout, indent=2)
          " > docs/public/versions.json.tmp
          mv docs/public/versions.json.tmp docs/public/versions.json

      - name: Commit versions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/public/versions.json
          git diff --cached --quiet || git commit -m "chore: update versions.json for ${GITHUB_REF#refs/tags/}"
          git push origin HEAD:main
